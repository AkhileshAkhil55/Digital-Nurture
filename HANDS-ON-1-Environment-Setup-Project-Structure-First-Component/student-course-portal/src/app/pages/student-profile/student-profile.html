<div class="profile-card" style="padding: 2rem; max-width: 600px; margin: 2rem auto; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
  <h2>Student Profile</h2>
  <hr style="margin: 1rem 0; border: none; border-top: 1px solid #eee;" />
  <p><strong>Name:</strong> {{ studentName }}</p>
  <p><strong>Student ID:</strong> {{ studentId }}</p>
  <p><strong>CGPA:</strong> {{ cgpa }}</p>
  <p><strong>Courses Enrolled ({{ coursesEnrolled.length }}):</strong></p>
  <ul>
    @for (course of coursesEnrolled; track course) {
      <li>{{ course }}</li>
    }
  </ul>
</div>
